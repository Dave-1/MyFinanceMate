Summary: Track your expenses, income and bank transactions with automatic SMS parsing.

Description: |
  MyFinanceMate is a privacy-first finance tracker that automatically
  reads bank SMS messages to log transactions. Features include:
  
  * Automatic SMS-based transaction tracking
  * Manual transaction entry
  * Category management with smart categorization
  * Income and expense tracking
  * Reminders for recurring payments
  * PIN and biometric security
  * Material 3 design with theme support
  * Backup and restore functionality
  * Fully offline — no data leaves your device

