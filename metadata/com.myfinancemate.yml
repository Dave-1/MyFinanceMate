Name: MyFinanceMate
Summary: Privacy-first expense tracker via SMS parsing
Description: |-
  MyFinanceMate is a privacy-first, open-source expense tracking
  Android app built with Jetpack Compose. It parses SMS bank alerts,
  stores data locally with Room, and visualises spending via bar-
  and pie-charts. Works offline, with no ads or trackers.

RepoType: git
