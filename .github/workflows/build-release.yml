name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > myfinanceMate.keystore

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Delete old release asset
        run: |
          RELEASE_ID=$(gh api repos/Dave-1/MyFinanceMate/releases/tags/v1.0.0 --jq '.id')
          ASSET_ID=$(gh api repos/Dave-1/MyFinanceMate/releases/$RELEASE_ID/assets --jq '.[] | select(.name=="MyFinanceMate.1.0.0.apk") | .id')
          if [ -n "$ASSET_ID" ]; then
            gh api -X DELETE repos/Dave-1/MyFinanceMate/releases/assets/$ASSET_ID
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        run: |
          RELEASE_ID=$(gh api repos/Dave-1/MyFinanceMate/releases/tags/v1.0.0 --jq '.id')
          UPLOAD_URL=$(gh api repos/Dave-1/MyFinanceMate/releases/$RELEASE_ID --jq '.upload_url' | sed 's/{?name,label}//')
          curl -s -X POST "${UPLOAD_URL}?name=MyFinanceMate.1.0.0.apk" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
